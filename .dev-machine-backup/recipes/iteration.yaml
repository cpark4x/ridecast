name: "ridecast2-session-iteration"
description: "Single iteration of the ridecast2 development machine — orient, work, verify, update state."
version: "2.0.0"
tags: ["ridecast2", "iteration", "working-session"]

context:
  state_file: ".dev-machine/STATE.yaml"
  context_file: ".dev-machine/CONTEXT-TRANSFER.md"
  specs_dir: "./specs"
  session_count: "0"

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Orient — read state before dispatching working session
  # ---------------------------------------------------------------------------
  - id: "orient"
    type: "bash"
    command: |
      cd /Users/chrispark/Projects/ridecast2
      python3 << 'PYEOF'
      import json, os, yaml

      SIZE_POINTS = {"S": 1, "M": 2, "L": 3, "XL": 5}
      MAX_SESSION_POINTS = 5
      # Specs larger than this are loaded alone — never bundled with other features.
      # A 55KB spec + base files + conversation history easily overflows 200k tokens.
      MAX_SPEC_SIZE_BYTES = 40_000

      def spec_size(spec_path):
          """Return file size in bytes, or 0 if missing/unreadable."""
          try:
              return os.path.getsize(spec_path) if spec_path else 0
          except OSError:
              return 0

      try:
          with open(".dev-machine/STATE.yaml") as f:
              state = yaml.safe_load(f)
          blockers = state.get("blockers", [])
          completed_list = set(state.get("completed_features", []))
          features = state.get("features", {})

          # --- Count ready / in-progress for summary ---
          ready = in_progress = 0
          for fid, fd in features.items():
              s = fd.get("status", "")
              if s == "ready":
                  deps = fd.get("depends_on", [])
                  if all(d in completed_list or features.get(d, {}).get("status") in ("completed", "done") for d in deps):
                      ready += 1
              elif s == "in-progress":
                  in_progress += 1

          # --- Build session work list (up to MAX_SESSION_POINTS) ---
          # This is the ONLY list the working session should read specs for.
          # Loading all ready specs at once overflows the context window.
          session_features = []
          session_points = 0

          # 1. Always include in-progress features (already started, must finish).
          #    LARGE-SPEC GUARD: if any in-progress spec exceeds MAX_SPEC_SIZE_BYTES,
          #    cap the budget immediately so no ready features are appended after it.
          for fid, fd in features.items():
              if fd.get("status") == "in-progress":
                  pts = SIZE_POINTS.get(fd.get("size", "M"), 2)
                  is_large = spec_size(fd.get("spec", "")) > MAX_SPEC_SIZE_BYTES
                  session_features.append({
                      "id": fid,
                      "spec": fd.get("spec", ""),
                      "description": fd.get("description", ""),
                      "size": fd.get("size", "M"),
                      "points": pts,
                      "status": "in-progress",
                      "large_spec": is_large,
                  })
                  session_points += pts
                  if is_large:
                      # Consume the entire budget — do not append any ready features.
                      session_points = MAX_SESSION_POINTS

          # 2. Fill remaining budget with ready features whose deps are satisfied.
          #    Preserve declaration order from STATE.yaml.
          #    Use `continue` (not `break`) on budget overflow so a smaller feature
          #    later in the list can still fit if the current one is too big.
          #    LARGE-SPEC GUARD: a spec > MAX_SPEC_SIZE_BYTES is only scheduled when
          #    the session is otherwise empty (session_points == 0).  After adding it,
          #    cap the budget so nothing else gets bundled with it.
          for fid, fd in features.items():
              if fd.get("status") != "ready":
                  continue
              if session_points >= MAX_SESSION_POINTS:
                  break
              deps = fd.get("depends_on", [])
              if not all(
                  d in completed_list or features.get(d, {}).get("status") in ("completed", "done")
                  for d in deps
              ):
                  continue  # dependency not yet satisfied
              pts = SIZE_POINTS.get(fd.get("size", "M"), 2)
              is_large = spec_size(fd.get("spec", "")) > MAX_SPEC_SIZE_BYTES
              if is_large and session_points > 0:
                  continue  # large spec needs a dedicated solo session; skip for now
              if session_points + pts > MAX_SESSION_POINTS:
                  continue  # too big for remaining budget; try next (smaller) feature
              session_features.append({
                  "id": fid,
                  "spec": fd.get("spec", ""),
                  "description": fd.get("description", ""),
                  "size": fd.get("size", "M"),
                  "points": pts,
                  "status": "ready",
                  "large_spec": is_large,
              })
              session_points += pts
              if is_large:
                  # Solo session for this large spec — cap budget now.
                  session_points = MAX_SESSION_POINTS

          print(json.dumps({
              "phase": state.get("phase", 0),
              "phase_name": state.get("phase_name", "unknown"),
              "epoch": state.get("epoch", 0),
              "next_action": state.get("next_action", ""),
              "ready_count": ready,
              "in_progress_count": in_progress,
              "completed_count": len(completed_list),
              "status": "blocked" if blockers else "healthy",
              "session_features": session_features,
              "session_points": session_points,
              "session_budget": MAX_SESSION_POINTS,
          }))
      except Exception as e:
          print(json.dumps({"status": "blocked", "error": str(e)}))
      PYEOF
    output: "orient_state"
    parse_json: true

  # ---------------------------------------------------------------------------
  # Step 1.3: Spec drift check
  # ---------------------------------------------------------------------------
  - id: "spec-drift-check"
    type: "bash"
    timeout: 60
    command: |
      cd /Users/chrispark/Projects/ridecast2
      python3 << 'SPECEOF'
      import os
      from pathlib import Path

      specs_dir = Path("./specs")
      STALE_THRESHOLD = 7 * 86400  # 7 days in seconds
      SKIP_DIRS = {"node_modules", ".git", "dist", ".next", ".dev-machine", "specs"}
      drift_flags = []

      # --- Collect all impl files ONCE (O(1) traversal, not O(N_specs)) ---
      # Previously: Path(".").rglob(pattern) was called once per spec file × 3 patterns
      # = 162 full directory walks on a 54-spec project → ~559s (timeout).
      # Fix: walk the tree once, filter in-memory, then match against each spec.
      impl_files = []
      for root, dirs, files in os.walk("."):
          # Prune skipped directories in-place so os.walk won't descend into them
          dirs[:] = [d for d in dirs if d not in SKIP_DIRS]
          for fname in files:
              if fname.endswith((".ts", ".tsx", ".js")):
                  impl_files.append(Path(root) / fname)

      if specs_dir.exists():
          for spec_file in sorted(specs_dir.rglob("*.md")):
              spec_mtime = spec_file.stat().st_mtime
              stem = spec_file.stem
              for suffix in ("-spec", "-module", "-feature", "-design"):
                  stem = stem.replace(suffix, "")
              stem = stem.lower()
              if len(stem) < 4:
                  continue
              for impl_file in impl_files:
                  if stem in impl_file.stem.lower():
                      impl_mtime = impl_file.stat().st_mtime
                      age_diff_s = impl_mtime - spec_mtime
                      if age_diff_s > STALE_THRESHOLD:
                          drift_flags.append((str(spec_file), str(impl_file), round(age_diff_s / 86400, 1)))

      if drift_flags:
          print(f"=== SPEC DRIFT DETECTED ({len(drift_flags)} candidate(s)) ===")
          for spec_f, impl_f, days in drift_flags[:10]:
              print(f"  HOUSEKEEPING: {spec_f} is {days}d older than {impl_f}")
          if len(drift_flags) > 10:
              print(f"  ... ({len(drift_flags) - 10} more candidates)")
          print("  Add spec-sync tasks to the next epoch, prioritized before new feature work.")
      else:
          print("=== SPEC DRIFT CHECK: OK (no significant drift detected) ===")
      SPECEOF
    output: "spec_drift_result"
    on_error: continue

  # ---------------------------------------------------------------------------
  # Step 1.4: API inventory — scan for public types, write to API-INVENTORY.md
  # NOTE: Writes to a SEPARATE file (not SCRATCH.md) and OVERWRITES each run.
  #       SCRATCH.md is for human notes only. API-INVENTORY.md is machine-generated.
  # ---------------------------------------------------------------------------
  - id: "api-inventory"
    type: "bash"
    command: |
      cd /Users/chrispark/Projects/ridecast2
      echo "=== API INVENTORY ==="
      INV_FILE=".dev-machine/API-INVENTORY.md"
      {
        echo "# API Inventory"
        echo ""
        echo "> Auto-generated $(date -u '+%Y-%m-%d %H:%M UTC') — overwritten each session. Do not edit."
        echo ""
        echo "## TypeScript / JavaScript public exports"
        echo ""
        grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
            -E "^export (default )?(interface|type|class|function|async function|const|enum|abstract class)" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git --exclude-dir=.next --exclude-dir=build \
            --exclude-dir=.worktrees \
            . 2>/dev/null | head -80 || echo "(none found)"
        echo ""
        echo "---"
      } > "$INV_FILE"
      echo "API inventory written to $INV_FILE (overwritten, not appended)"
    output: "api_inventory_result"
    on_error: continue

  # ---------------------------------------------------------------------------
  # Step 1.5: Test environment preflight (adapted for Vitest)
  # ---------------------------------------------------------------------------
  - id: "test-env-preflight"
    type: "bash"
    command: |
      cd /Users/chrispark/Projects/ridecast2
      echo "=== TEST ENVIRONMENT PREFLIGHT ==="
      set +e
      COLLECT_OUTPUT=$(npx vitest list 2>&1)
      COLLECT_EXIT=$?
      set -e
      echo "$COLLECT_OUTPUT" | head -40
      if [ $COLLECT_EXIT -eq 0 ]; then
        echo "Test runner is functional."
        echo '{"test_env": "ok"}'
      else
        echo ""
        echo "TEST RUNNER FAILED (exit $COLLECT_EXIT) -- structural failure, not a test failure."
        echo "Retrying will NOT fix a broken test runner. Writing postmortem and halting."
        POSTMORTEM_FILE="/Users/chrispark/Projects/ridecast2/.dev-machine/POST-MORTEM.md"
        {
          echo "=== Dev Machine Post-Mortem: Test Environment Broken ==="
          echo "Date:   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Reason: test-env-preflight failed -- npx vitest list exited $COLLECT_EXIT"
          echo ""
          echo "The test runner itself is broken. This is NOT a test failure -- it is a"
          echo "structural failure (e.g. missing dependency, import error, syntax error in"
          echo "test infrastructure). Retrying will not fix this."
          echo ""
          echo "To resume: fix the test runner error shown above, then restart the machine."
          echo ""
          echo "=== Preflight output ==="
          echo "$COLLECT_OUTPUT"
        } > "$POSTMORTEM_FILE"
        touch "/Users/chrispark/Projects/ridecast2/.dev-machine-test-env-broken"
        echo '{"test_env": "broken"}'
        exit 99
      fi
    output: "test_env_result"
    parse_json: true
    on_error: fail

  # ---------------------------------------------------------------------------
  # Step 1.6: Module health check (safe no-op for ridecast2's monorepo structure)
  # ---------------------------------------------------------------------------
  - id: "module-health-check"
    type: "bash"
    command: |
      cd /Users/chrispark/Projects/ridecast2
      echo "=== MODULE HEALTH CHECK ==="
      # ridecast2 uses src/ not packages/ — check src subdirectories
      OVERSIZED=""
      for dir in src/*/; do
        [ -d "$dir" ] || continue
        name=$(basename "$dir")
        loc=$(find "$dir" -name "*.ts" -o -name "*.tsx" | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
        if [ -n "$loc" ] && [ "$loc" -gt 2000 ]; then
          OVERSIZED="$OVERSIZED $name($loc)"
        fi
      done
      if [ -n "$OVERSIZED" ]; then
        echo "WARNING: Large source directories:$OVERSIZED"
        echo '{"health": "warn-oversized", "oversized": "'"$OVERSIZED"'"}'
      else
        echo "All source directories within size limits."
        echo '{"health": "ok"}'
      fi
    output: "health_result"
    parse_json: true
    on_error: continue

  # ---------------------------------------------------------------------------
  # Step 2: Dispatch fresh working session
  # ---------------------------------------------------------------------------
  - id: "working-session"
    agent: "self"
    prompt: |
      You are a WORKING SESSION of the ridecast2 development machine.
      You start with ZERO prior context. Your job: read state, do work, persist state, exit.

      ## CONTEXT BUDGET WARNING
      The context window is limited. To stay within budget:
      - Read ONLY the files listed below at startup — nothing else upfront.
      - Read feature specs LAZILY: read each spec file only when you are about to start
        that feature, NOT all at once at the beginning.
      - Do NOT read SCRATCH.md, content-pipeline.md, or any spec not in your work list.

      START BY READING THESE FILES (in this order):
      1. .dev-machine/STATE.yaml — current phase, what's done, what's next
      2. .dev-machine/CONTEXT-TRANSFER.md — recent decisions and handoff context
      3. .dev-machine/working-session-instructions.md — your detailed operating procedure
      4. specs/architecture.md — the overall architecture (always read this)

      DO NOT read any spec files yet. See LAZY SPEC LOADING below.

      ## Platform Grounding (MANDATORY before writing any code)

      Before writing ANY code that uses project-internal APIs, types, or interfaces:
      1. **Enumerate actual types/interfaces**: Read .dev-machine/API-INVENTORY.md to find
         what actually exists. DO NOT rely on your training data or invent APIs.
      2. **Map each requirement to an existing type**: For each feature requirement, identify the
         actual type/API you will call. Write this mapping as a comment before coding.
      3. **If a requirement cannot be mapped to an existing type**: Do NOT invent an API.
         Add a blocker to .dev-machine/STATE.yaml and stop.

      ## LAZY SPEC LOADING (CRITICAL — saves context budget)

      Your work list is in `session_features` from the orient step output above.
      Orient has already applied the 5-point budget cap — do NOT re-scan STATE.yaml.

      For each feature in `session_features`, work in this order:
        1. READ that feature's spec file (the "spec" path in session_features).
           Do this JUST BEFORE starting work on it — not before.
        2. Update STATE.yaml to mark it in-progress with timestamp.
        3. Apply Platform Grounding — read API-INVENTORY.md, enumerate actual APIs.
        4. Write failing tests first (TDD).
        5. Implement minimal code to pass tests.
        6. Run: npm run test
        7. Run: npm run build
        8. BOTH must pass before proceeding.
        9. Verify integration: confirm features are reachable through actual entry
           points, and that no stub/mock implementations remain in production paths.
        10. Spawn a fresh sub-agent for antagonistic review (give it the spec + your diff).
        11. Fix any review issues found.
        12. Commit: feat(<scope>): <description>
        13. Update STATE.yaml to mark it done with commit hash.
        THEN move to the next feature and read its spec.

      - Update CONTEXT-TRANSFER.md with decisions made and work completed.

      ## Important: Files are Factored (Do NOT Read Archives)

      STATE.yaml and CONTEXT-TRANSFER.md are kept slim (~300 lines each).
      - Do NOT read FEATURE-ARCHIVE.yaml or SESSION-ARCHIVE.md — they are append-only archives.
      - Do NOT read SCRATCH.md — it contains outdated human notes, not machine state.
      - API-INVENTORY.md is the authoritative source for current public exports.

      IF BLOCKED: add blocker to STATE.yaml blockers list, update CONTEXT-TRANSFER.md, stop.
      IF DEGRADATION DETECTED (repeating yourself, losing coherence): commit work, update state, stop.

      ## SAFETY CONSTRAINTS (MANDATORY -- NEVER VIOLATE)
      - Your working directory is /Users/chrispark/Projects/ridecast2. Do NOT access files outside this directory.
      - FORBIDDEN: rm -rf, find -delete, any command targeting paths outside your working directory
      - Do NOT access: ~/.ssh/, ~/.amplifier/keys.env, .env files, *.pem, *.key
      - Do NOT run: git push, git remote add
      - Do NOT install global packages (npm install -g)
      - If you need something outside these boundaries, add a blocker and STOP.
    output: "session_result"
    timeout: 3600

  # ---------------------------------------------------------------------------
  # Step 3: Build + regression gate
  # ---------------------------------------------------------------------------
  - id: "build-check"
    type: "bash"
    command: |
      cd /Users/chrispark/Projects/ridecast2
      echo "=== POST-SESSION BUILD + REGRESSION CHECK ==="
      BUILD_FAILED=0
      TEST_FAILED=0

      # --- 1. Build / type-check ---
      echo "--- Build: npm run build ---"
      set +e
      npm run build 2>&1
      BUILD_EXIT=$?
      set -e
      if [ $BUILD_EXIT -eq 0 ]; then
        echo "BUILD: clean"
      else
        echo "BUILD FAILED (exit $BUILD_EXIT)"
        BUILD_FAILED=1
      fi

      # --- 2. Full test suite (regression detection) ---
      echo ""
      echo "--- Full test suite: npm run test (regression check) ---"
      set +e
      npm run test 2>&1
      TEST_EXIT=$?
      set -e
      if [ $TEST_EXIT -eq 0 ]; then
        echo "TESTS: all passing"
      else
        echo "TESTS FAILED (exit $TEST_EXIT) -- check for regressions"
        TEST_FAILED=1
      fi

      # --- 3. Integration verification checklist ---
      echo ""
      echo "=== INTEGRATION VERIFICATION CHECKLIST (next session must confirm) ==="
      echo "  [1] Completed features are reachable through actual entry points."
      echo "  [2] No stub/mock implementations remain in production code paths."
      echo "  [3] All referenced types exist in schema/registry (no dangling references)."

      # --- 4. Paper tiger detection ---
      echo ""
      echo "=== PAPER TIGER DETECTION ==="
      PT_FLAGS=0

      echo "--- PT-1: Stub/placeholder implementations in production code ---"
      set +e
      STUB_HITS=$(grep -rn \
          --include="*.ts" --include="*.tsx" --include="*.js" \
          --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist --exclude-dir=.next \
          -E "(raise NotImplementedError|TODO: implement|FIXME: implement|stub implementation|not yet implemented)" \
          . 2>/dev/null \
          | grep -v "test_" | grep -v "_test\." | grep -v "\.test\." | grep -v "\.spec\." \
          | head -20)
      set -e
      if [ -n "$STUB_HITS" ]; then
          echo "WARNING: Possible stub implementations in production paths:"
          echo "$STUB_HITS"
          PT_FLAGS=$((PT_FLAGS + 1))
      else
          echo "OK: No obvious stub patterns found in production source."
      fi

      echo ""
      if [ $PT_FLAGS -gt 0 ]; then
          echo "PAPER TIGER CHECK: $PT_FLAGS warning(s). Review stub hits above."
      else
          echo "PAPER TIGER CHECK: clean."
      fi

      # --- 5. Write blockers if needed ---
      if [ $BUILD_FAILED -eq 1 ]; then
        echo ""
        echo "Adding build blocker to .dev-machine/STATE.yaml..."
        python3 -c "import yaml,datetime;f=open('.dev-machine/STATE.yaml');s=yaml.safe_load(f);f.close();b=s.get('blockers') or [];b.append({'description':'npm run build failed after working session','since':datetime.datetime.now().isoformat(),'severity':'high'});s['blockers']=b;f=open('.dev-machine/STATE.yaml','w');yaml.dump(s,f,default_flow_style=False,sort_keys=False);f.close()"
      fi
      if [ $TEST_FAILED -eq 1 ]; then
        echo ""
        echo "Adding regression blocker to .dev-machine/STATE.yaml..."
        python3 -c "import yaml,datetime;f=open('.dev-machine/STATE.yaml');s=yaml.safe_load(f);f.close();b=s.get('blockers') or [];b.append({'description':'npm run test failed after working session -- regression detected','since':datetime.datetime.now().isoformat(),'severity':'high'});s['blockers']=b;f=open('.dev-machine/STATE.yaml','w');yaml.dump(s,f,default_flow_style=False,sort_keys=False);f.close()"
      fi

      if [ $BUILD_FAILED -eq 1 ] || [ $TEST_FAILED -eq 1 ]; then
        echo '{"build_status": "failed"}'
      else
        echo '{"build_status": "clean"}'
      fi
    output: "build_result"
    timeout: 300

  # ---------------------------------------------------------------------------
  # Step 4: Post-session — archive, track, audit
  # ---------------------------------------------------------------------------
  - id: "post-session"
    type: "bash"
    command: |
      cd /Users/chrispark/Projects/ridecast2
      python3 << 'PYEOF'
      import json, yaml, re, os, subprocess
      from datetime import datetime, timezone

      try:
          with open(".dev-machine/STATE.yaml") as f:
              state = yaml.safe_load(f)

          session_num = int("{{session_count}}") + 1

          # --- Archive completed features ---
          features = state.get("features", {})
          completed_list = state.get("completed_features", [])
          if isinstance(completed_list, list):
              newly_completed = {fid: fd for fid, fd in features.items() if fd.get("status") in ("completed", "done")}
              if newly_completed:
                  archive_path = ".dev-machine/FEATURE-ARCHIVE.yaml"
                  try:
                      with open(archive_path) as f:
                          archive = yaml.safe_load(f) or {}
                  except FileNotFoundError:
                      archive = {"description": "Completed feature archive. Append-only.", "features": {}}
                  arch_feats = archive.get("features", {})
                  for fid, fd in newly_completed.items():
                      if fid not in completed_list:
                          completed_list.append(fid)
                      arch_feats[fid] = fd
                      del features[fid]
                  archive["features"] = arch_feats
                  state["completed_features"] = completed_list
                  state["features"] = features
                  with open(archive_path, "w") as f:
                      yaml.dump(archive, f, default_flow_style=False, sort_keys=False, width=120)

          # --- Archive old session summaries (keep last 5) ---
          KEEP_SESSIONS = 5
          ctx_path = ".dev-machine/CONTEXT-TRANSFER.md"
          session_archive = ".dev-machine/SESSION-ARCHIVE.md"
          if os.path.exists(ctx_path):
              with open(ctx_path) as f:
                  ctx = f.read()
              sess = list(re.finditer(r'^### Session \d+ Summary', ctx, re.MULTILINE))
              if len(sess) > KEEP_SESSIONS:
                  header = ctx[:sess[0].start()]
                  keep_from = sess[-KEEP_SESSIONS]
                  to_archive = ctx[sess[0].start():keep_from.start()]
                  keep = ctx[keep_from.start():]
                  if to_archive.strip():
                      existing = ""
                      if os.path.exists(session_archive):
                          with open(session_archive) as f:
                              existing = f.read()
                      if not existing:
                          existing = "# Session Archive\n\n> Archived session summaries. Append-only.\n\n"
                      if to_archive[:50] not in existing:
                          with open(session_archive, "a") as f:
                              f.write(to_archive)
                  with open(ctx_path, "w") as f:
                      f.write(header)
                      f.write(f"> **Note**: Older sessions archived in SESSION-ARCHIVE.md.\n")
                      f.write(f"> Only the last {KEEP_SESSIONS} sessions kept here.\n\n")
                      f.write(keep)

          # --- Session count and zero-change tracking ---
          meta = state.setdefault("meta", {})
          meta["session_count"] = meta.get("session_count", 0) + 1
          try:
              current_head = subprocess.run(
                  ["git", "-C", "/Users/chrispark/Projects/ridecast2", "rev-parse", "HEAD"],
                  capture_output=True, text=True, timeout=5
              ).stdout.strip()
              last_head = meta.get("last_session_head", "")
              if last_head and current_head == last_head:
                  meta["zero_change_sessions"] = meta.get("zero_change_sessions", 0) + 1
                  print(f"ZERO-CHANGE SESSION #{meta['zero_change_sessions']}: no code commits this session (HEAD: {current_head[:8]})")
              else:
                  meta["zero_change_sessions"] = 0
              meta["last_session_head"] = current_head
          except Exception:
              pass

          # --- Stale state metadata reconciliation ---
          actual_completed = len(state.get("completed_features", []))
          recorded = meta.get("total_features_completed", 0)
          if recorded != actual_completed:
              print(f"RECONCILIATION: total_features_completed {recorded} != actual {actual_completed}. Fixing.")
              meta["total_features_completed"] = actual_completed
          state["meta"] = meta

          # --- Update epoch and check health ---
          state["epoch"] = state.get("epoch", 0) + 1
          state["last_session"] = datetime.now(timezone.utc).isoformat()
          blockers = state.get("blockers", [])

          with open(".dev-machine/STATE.yaml", "w") as f:
              yaml.dump(state, f, default_flow_style=False, sort_keys=False, width=120)

          remaining = sum(1 for f in features.values() if f.get("status") not in ("completed", "done"))
          status = "blocked" if blockers else ("complete" if remaining == 0 else "healthy")

          print(json.dumps({
              "status": status,
              "session_count": str(session_num),
              "total_features": meta.get("total_features_completed", 0)
          }))
      except Exception as e:
          print(json.dumps({"status": "blocked", "session_count": "{{session_count}}", "error": str(e)}))
      PYEOF

      # --- Periodic clean-room check (every 10 sessions) ---
      SESSION_COUNT=$(python3 -c "
      import yaml
      with open('.dev-machine/STATE.yaml') as f:
          s = yaml.safe_load(f)
      print(s.get('meta', {}).get('session_count', 0))
      " 2>/dev/null || echo "0")
      if [ -n "$SESSION_COUNT" ] && [ "$SESSION_COUNT" -gt 0 ] && [ $((SESSION_COUNT % 10)) -eq 0 ]; then
        echo ""
        echo "=== PERIODIC CLEAN-ROOM CHECK (session $SESSION_COUNT) ==="
        cd /Users/chrispark/Projects/ridecast2
        set +e
        echo "--- Clean install: npm ci ---"
        npm ci 2>&1
        echo "--- Full test suite: npm run test ---"
        npm run test 2>&1
        CLEANROOM_EXIT=$?
        set -e
        if [ $CLEANROOM_EXIT -eq 0 ]; then
          echo "CLEAN-ROOM CHECK: PASSED"
        else
          echo "CLEAN-ROOM CHECK: FAILED -- environment drift detected"
          python3 -c "
      import yaml, datetime
      with open('.dev-machine/STATE.yaml') as f:
          s = yaml.safe_load(f)
      b = s.get('blockers') or []
      b.append({
          'description': 'Clean-room check failed -- environment drift detected. Refresh lock files.',
          'since': datetime.datetime.now().isoformat(),
          'severity': 'medium'
      })
      s['blockers'] = b
      with open('.dev-machine/STATE.yaml', 'w') as f:
          yaml.dump(s, f, default_flow_style=False, sort_keys=False, width=120)
      print('Blocker added.')
      "
        fi
        echo "=== END CLEAN-ROOM CHECK ==="
      fi
    output: "iteration_result"
    parse_json: true
