# =============================================================================
# Known Issues (ordered by impact)
# =============================================================================

known_issues:
  - id: "pattern-a"
    severity: "P1"
    title: "E2E Pattern A — Ambiguous getByText('Library') selector"
    affected_files:
      - "e2e/commute-flow.spec.ts:11"
      - "e2e/offline-listening.spec.ts:8"
      - "e2e/quick-relisten.spec.ts:8"
    root_cause: |
      Matches 3+ DOM elements under Playwright strict mode,
      making the selector non-deterministic.
    fix: |
      Replace with role-scoped selector:
        - page.getByRole('tab', { name: 'Library' })
        - page.getByRole('button', { name: 'Library' })
        - page.getByTestId('library-tab') if ambiguity persists

  - id: "pattern-b"
    severity: "P1"
    title: "E2E Pattern B — Missing 'Target Duration' element"
    affected_files:
      - "e2e/pdf-commute.spec.ts:19"
      - "e2e/article-discussion.spec.ts:14"
    root_cause: |
      Text not found in DOM after file upload step.
      Possible causes:
        1. Incorrect webServer config (port/URL mismatch)
        2. UI flow regression or missing navigation step
        3. Copy/text mismatch between spec and implementation
    fix: |
      1. Verify playwright.config.ts webServer config:
         - webServer.url === 'http://localhost:3000'
         - use.baseURL === 'http://localhost:3000'
      2. Confirm "Target Duration" label renders in upload flow
      3. If missing, add navigation step or update spec copy

  - id: "type-check-caveat"
    severity: "P2"
    title: "Type-check caveat: Request vs NextRequest mismatch"
    affected_file: "src/app/api/playback/route.test.ts"
    notes: |
      npx tsc --noEmit fails but npm run build succeeds.
      Next.js handles internally; not gating.
      Not a priority for v1.

