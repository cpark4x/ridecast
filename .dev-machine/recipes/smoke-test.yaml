name: "ridecast2-smoke-test"
description: "Structural smoke test for the ridecast2 dev machine. Validates file existence, YAML validity, Docker config, and STATE.yaml content."
version: "1.0.0"
tags: ["smoke-test", "validation", "dev-machine", "ridecast2"]

context:
  base_dir: ".dev-machine"

steps:
  - id: "preflight"
    type: "bash"
    command: |
      if [ ! -d ".dev-machine" ]; then
          echo "ERROR: .dev-machine/ directory not found."
          exit 1
      fi
      echo "Preflight OK: .dev-machine/ directory found."
    on_error: "fail"

  - id: "check-file-existence"
    type: "bash"
    command: |
      python3 << 'PYEOF'
      import json, os, stat

      BASE = ".dev-machine"
      failed = []
      passed = []

      # (path relative to .dev-machine/, must_be_executable)
      required = [
          ("STATE.yaml",                             False),
          ("AGENTS.md",                              False),
          ("SCRATCH.md",                             False),
          ("CONTEXT-TRANSFER.md",                    False),
          ("POST-MORTEM.md",                         False),
          ("SESSION-ARCHIVE.md",                     False),
          ("working-session-instructions.md",        False),
          ("FEATURE-ARCHIVE.yaml",                   False),
          ("recipes/build.yaml",                     False),
          ("recipes/iteration.yaml",                 False),
          ("recipes/health-check.yaml",              False),
          ("recipes/fix-iteration.yaml",             False),
          ("recipes/smoke-test.yaml",                False),
      ]

      # Optional Docker files (check but don't fail)
      optional = [
          ("scripts/entrypoint.sh",                  True),
          ("scripts/dev-machine-watchdog.sh",         True),
          ("scripts/dev-machine-monitor.sh",          True),
          ("dev-machine.Dockerfile",                  False),
          ("docker-compose.dev-machine.yaml",         False),
      ]

      for relpath, must_exec in required:
          full = os.path.join(BASE, relpath)
          if not os.path.isfile(full):
              failed.append(f"MISSING: {full}")
              print(f"  [FAIL] MISSING: {full}")
          elif must_exec:
              mode = os.stat(full).st_mode
              if not (mode & (stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)):
                  failed.append(f"NOT EXECUTABLE: {full}")
                  print(f"  [FAIL] NOT EXECUTABLE: {full}")
              else:
                  passed.append(full)
                  print(f"  [PASS] {full} (executable)")
          else:
              passed.append(full)
              print(f"  [PASS] {full}")

      for relpath, must_exec in optional:
          full = os.path.join(BASE, relpath)
          if not os.path.isfile(full):
              print(f"  [INFO] OPTIONAL MISSING: {full}")
          elif must_exec:
              mode = os.stat(full).st_mode
              if not (mode & (stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)):
                  print(f"  [WARN] NOT EXECUTABLE: {full}")
              else:
                  passed.append(full)
                  print(f"  [PASS] {full} (executable)")
          else:
              passed.append(full)
              print(f"  [PASS] {full}")

      print(json.dumps({
          "status": "fail" if failed else "pass",
          "passed": len(passed),
          "failed": len(failed),
          "failures": failed
      }))
      PYEOF
    output: "file_check"
    parse_json: true
    on_error: "continue"

  - id: "check-yaml-validity"
    type: "bash"
    command: |
      python3 << 'PYEOF'
      import json, yaml, os, glob

      failed = []
      passed = []

      targets = [".dev-machine/STATE.yaml"] + sorted(glob.glob(".dev-machine/recipes/*.yaml"))

      for path in targets:
          if not os.path.isfile(path):
              failed.append(f"MISSING (cannot check): {path}")
              print(f"  [SKIP] MISSING: {path}")
              continue
          try:
              with open(path) as fh:
                  doc = yaml.safe_load(fh)
              if doc is None:
                  failed.append(f"EMPTY YAML: {path}")
                  print(f"  [FAIL] EMPTY YAML: {path}")
              else:
                  passed.append(path)
                  print(f"  [PASS] {path}")
          except yaml.YAMLError as e:
              msg = str(e).split("\n")[0]
              failed.append(f"PARSE ERROR in {path}: {msg}")
              print(f"  [FAIL] PARSE ERROR: {path}: {msg}")

      print(json.dumps({
          "status": "fail" if failed else "pass",
          "passed": len(passed),
          "failed": len(failed),
          "failures": failed
      }))
      PYEOF
    output: "yaml_check"
    parse_json: true
    on_error: "continue"

  - id: "check-docker-config"
    type: "bash"
    command: |
      COMPOSE_FILE=".dev-machine/docker-compose.dev-machine.yaml"

      if ! command -v docker &>/dev/null; then
          echo "  [SKIP] docker not found on PATH"
          echo '{"status": "skip", "reason": "docker not available", "passed": 0, "failed": 0, "failures": []}'
          exit 0
      fi

      if [ ! -f "$COMPOSE_FILE" ]; then
          echo "  [SKIP] $COMPOSE_FILE not found"
          echo '{"status": "skip", "reason": "compose file missing", "passed": 0, "failed": 0, "failures": []}'
          exit 0
      fi

      if docker compose -f "$COMPOSE_FILE" config --quiet 2>&1; then
          echo "  [PASS] docker compose config is valid"
          echo '{"status": "pass", "passed": 1, "failed": 0, "failures": []}'
      else
          echo "  [FAIL] docker compose config reported errors"
          echo '{"status": "fail", "passed": 0, "failed": 1, "failures": ["docker compose config failed"]}'
      fi
    output: "docker_check"
    parse_json: true
    on_error: "continue"

  - id: "check-state-content"
    type: "bash"
    command: |
      python3 << 'PYEOF'
      import json, yaml

      failed = []
      passed = []

      try:
          with open(".dev-machine/STATE.yaml") as f:
              state = yaml.safe_load(f)

          if not isinstance(state, dict):
              failed.append("STATE.yaml does not contain a YAML mapping")
              print("  [FAIL] STATE.yaml is not a mapping")
          else:
              project = state.get("project", {})
              if project.get("name"):
                  passed.append("project.name")
                  print(f"  [PASS] project.name = \"{project['name']}\"")
              else:
                  failed.append("project.name missing or empty")
                  print("  [FAIL] project.name missing or empty")

              if state.get("completed_features") or state.get("features"):
                  passed.append("features")
                  print(f"  [PASS] features/completed_features present")
              else:
                  failed.append("No features data found")
                  print("  [FAIL] No features data found")

              if state.get("epoch") is not None:
                  passed.append("epoch")
                  print(f"  [PASS] epoch = {state['epoch']}")
              else:
                  failed.append("epoch missing")
                  print("  [FAIL] epoch missing")

              meta = state.get("meta", {})
              if meta.get("session_count") is not None:
                  passed.append("meta.session_count")
                  print(f"  [PASS] meta.session_count = {meta['session_count']}")
              else:
                  failed.append("meta.session_count missing")
                  print("  [FAIL] meta.session_count missing")

      except FileNotFoundError:
          failed.append("STATE.yaml not found")
      except yaml.YAMLError as e:
          failed.append(f"YAML parse error: {e}")

      print(json.dumps({
          "status": "fail" if failed else "pass",
          "passed": len(passed),
          "failed": len(failed),
          "failures": failed
      }))
      PYEOF
    output: "state_check"
    parse_json: true
    on_error: "continue"

  - id: "smoke-test-summary"
    type: "bash"
    command: |
      echo ""
      echo "============================================================"
      echo "  ridecast2 DEV MACHINE -- SMOKE TEST RESULTS"
      echo "============================================================"
      echo ""

      TOTAL_FAIL=0

      report_check() {
        local label="$1"
        local status="$2"
        local n_passed="$3"
        local n_failed="$4"
        case "$status" in
          pass) printf "  %-30s  PASS  (%s checks)\n" "$label" "$n_passed" ;;
          skip) printf "  %-30s  SKIP\n" "$label" ;;
          *)
            printf "  %-30s  FAIL  (%s failed)\n" "$label" "$n_failed"
            TOTAL_FAIL=$((TOTAL_FAIL + 1))
            ;;
        esac
      }

      report_check "File Existence"       "{{file_check.status}}"    "{{file_check.passed}}"    "{{file_check.failed}}"
      report_check "YAML Validity"        "{{yaml_check.status}}"    "{{yaml_check.passed}}"    "{{yaml_check.failed}}"
      report_check "Docker Config"        "{{docker_check.status}}"  "{{docker_check.passed}}"  "{{docker_check.failed}}"
      report_check "STATE.yaml Content"   "{{state_check.status}}"   "{{state_check.passed}}"   "{{state_check.failed}}"

      echo ""
      echo "------------------------------------------------------------"
      if [ "$TOTAL_FAIL" -eq 0 ]; then
          echo "  RESULT: ALL CHECKS PASSED"
          echo "  Dev machine is structurally sound and ready to run."
      else
          echo "  RESULT: $TOTAL_FAIL CHECK(S) FAILED"
          echo "  Fix the failures above before starting the dev machine."
      fi
      echo "------------------------------------------------------------"
      echo ""

      if [ "$TOTAL_FAIL" -gt 0 ]; then
          exit 1
      fi
    on_error: "fail"
