# =============================================================================
# ridecast2-build: The Development Machine Outer Loop
# =============================================================================
#
# This is the meta-recipe -- the "machine" itself. It reads project state,
# dispatches fresh working sessions, and loops until the project is complete
# or a blocker is hit.
#
# Each working session starts with zero context, reads STATE.yaml and
# CONTEXT-TRANSFER.md, does a bounded batch of work (5 features),
# persists all state back to files, and exits.
#
# Usage:
#   amplifier recipe execute .dev-machine/build.yaml
#
# =============================================================================

name: "ridecast2-build"
description: "Outer orchestration loop for the ridecast2 development machine. Reads state, dispatches working sessions, persists progress across context windows."
version: "1.0.0"
author: "ridecast2 Development Machine"
tags: ["orchestration", "meta-recipe", "development-machine", "ridecast2"]

context:
  state_file: ".dev-machine/STATE.yaml"
  context_file: ".dev-machine/CONTEXT-TRANSFER.md"
  specs_dir: "specs"
  status: "healthy"
  session_count: "0"

steps:
  # ---------------------------------------------------------------------------
  # Step 0: Container safety check -- refuse to run on bare host
  # ---------------------------------------------------------------------------
  - id: "container-check"
    type: "bash"
    command: |
      # Check if running inside a container
      if [ ! -f /.dockerenv ] && [ ! -f /run/.containerenv ]; then
          echo "=========================================="
          echo "ERROR: DEV MACHINE NOT RUNNING IN CONTAINER"
          echo "=========================================="
          echo ""
          echo "Running dev-machine recipes outside a container is DANGEROUS."
          echo "Autonomous agents have unrestricted filesystem access and can"
          echo "damage files outside the project directory."
          echo ""
          echo "Use: ./run-dev-machine.sh"
          echo "Or:  docker compose run --rm dev-machine"
          echo ""
          echo "To bypass this check (NOT RECOMMENDED):"
          echo "  export DEV_MACHINE_ALLOW_HOST=1"
          echo "=========================================="
          if [ -z "${DEV_MACHINE_ALLOW_HOST:-}" ]; then
              exit 1
          fi
          echo "WARNING: DEV_MACHINE_ALLOW_HOST is set. Proceeding on bare host."
          echo "YOU ACCEPT ALL RISKS OF FILESYSTEM DAMAGE."
      fi
      echo "Container check passed."
    on_error: "fail"

  # ---------------------------------------------------------------------------
  # Step 1: Read STATE.yaml and check for blockers
  # ---------------------------------------------------------------------------
  - id: "read-state"
    type: "bash"
    command: |
      python3 << 'PYEOF'
      import json, yaml
      try:
          with open(".dev-machine/STATE.yaml") as f:
              state = yaml.safe_load(f)
          blockers = state.get("blockers", [])
          result = {
              "phase": state.get("phase", 0),
              "phase_name": state.get("phase_name", "unknown"),
              "epoch": state.get("epoch", 0),
              "next_action": state.get("next_action", ""),
              "blocker_count": len(blockers),
              "blockers": blockers,
              "status": "blocked" if blockers else "healthy"
          }
          print(json.dumps(result))
      except Exception as e:
          print(json.dumps({
              "status": "blocked",
              "blockers": ["Failed to read STATE.yaml: " + str(e)],
              "blocker_count": 1
          }))
      PYEOF
    output: "initial_state"
    parse_json: true

  # ---------------------------------------------------------------------------
  # Step 2: Attempt to resolve blockers before halting
  #
  # TASK 29 (Self-Healing Blocker Resolution): When blockers exist, dispatch a
  # focused agent that reads each blocker, diagnoses it, and attempts a fix.
  # Infrastructure/config issues are fixed in place; genuine human-judgment
  # blockers are left for escalation. Only halts if blockers persist after
  # the resolution attempt.
  # ---------------------------------------------------------------------------
  - id: "resolve-blockers"
    type: "agent"
    agent: "self"
    condition: "{{initial_state.status}} == 'blocked'"
    prompt: |
      You are a BLOCKER RESOLUTION SESSION for the ridecast2 development machine.
      Blockers have been detected in .dev-machine/STATE.yaml that are preventing the build loop
      from starting. Your job is to read each blocker, diagnose it, and fix it if possible.

      START BY READING:
      1. .dev-machine/STATE.yaml -- see the `blockers` list
      2. .dev-machine/CONTEXT-TRANSFER.md -- recent context from prior sessions

      ## Blocker Taxonomy

      **ALWAYS fix these yourself (NEVER leave as blockers):**
      | Category | Examples |
      |----------|----------|
      | Build/config broken | tsconfig.json, eslint, vite, package.json, pyproject.toml |
      | Missing dependency | Package not in package.json / requirements.txt / pyproject.toml |
      | Type errors | Type errors in code from prior sessions |
      | Test infrastructure | Test runner config, missing test deps, vitest/pytest setup |
      | Regression failures | Previously-passing tests now failing -- find the breaking change |
      | Environment drift | Stale lockfile, tool version mismatch |
      | Missing files / wiring | Import/export not connected, file not created |

      **Leave these as blockers (require human judgment):**
      | Category | Examples |
      |----------|----------|
      | Spec ambiguity | Two reasonable approaches; spec is silent on which |
      | Missing external service | API key needed, external system not configured |
      | Architecture question | Which fundamental approach to take (multiple valid options) |
      | Out-of-scope access | Needs files/creds outside the project directory |

      **Rule of thumb:** If the fix is objective (only one correct answer), fix it.
      If reasonable engineers would disagree on the fix, leave it as a blocker.

      ## Procedure

      FOR EACH BLOCKER:
      1. Read the description carefully
      2. Diagnose: is this fixable without human judgment?
      3. If YES: implement the fix, verify it works (run the build/test commands), then
         remove the blocker from .dev-machine/STATE.yaml
      4. If NO: leave it in .dev-machine/STATE.yaml with a clear explanation of why it needs human input

      After processing all blockers, update .dev-machine/STATE.yaml:
      - Remove resolved blockers from the `blockers` list
      - Keep genuine human-judgment blockers
      - Update .dev-machine/CONTEXT-TRANSFER.md with a summary of what you fixed

      ## Safety Constraints (MANDATORY -- NEVER VIOLATE)
      - Your working directory is /Users/chrispark/Projects/ridecast2. Do NOT access files outside this directory.
      - Do NOT run: git push, git remote add, or any command that sends code to a remote repository
      - Do NOT install global packages (pip install without venv, npm install -g)
      - If you need something outside these boundaries, leave the blocker in place.
    output: "blocker_resolution_result"
    timeout: 1800

  # ---------------------------------------------------------------------------
  # Step 2b: Re-read state after resolution attempt
  # ---------------------------------------------------------------------------
  - id: "recheck-state"
    type: "bash"
    condition: "{{initial_state.status}} == 'blocked'"
    command: |
      python3 << 'PYEOF'
      import json, yaml
      try:
          with open(".dev-machine/STATE.yaml") as f:
              state = yaml.safe_load(f)
          blockers = state.get("blockers", [])
          result = {
              "blocker_count": len(blockers),
              "blockers": blockers,
              "status": "blocked" if blockers else "healthy"
          }
          print(json.dumps(result))
      except Exception as e:
          print(json.dumps({
              "status": "blocked",
              "blockers": ["Failed to re-read STATE.yaml: " + str(e)],
              "blocker_count": 1
          }))
      PYEOF
    output: "post_resolution_state"
    parse_json: true

  # ---------------------------------------------------------------------------
  # Step 2c: If blockers STILL exist after resolution attempt, halt
  #
  # NOTE: We gate on initial_state.status (always defined by read-state) rather
  # than post_resolution_state.status. When initial_state is not 'blocked',
  # steps 2/2b are skipped and post_resolution_state is never set -- referencing
  # it would cause an "undefined variable" crash. This is logically equivalent:
  # we only reach here when initial_state was blocked, and recheck-state has
  # updated post_resolution_state by that point.
  # ---------------------------------------------------------------------------
  - id: "check-health"
    type: "bash"
    condition: "{{initial_state.status}} == 'blocked'"
    command: |
      python3 << 'PYEOF'
      import json, yaml
      try:
          with open(".dev-machine/STATE.yaml") as f:
              state = yaml.safe_load(f)
          blockers = state.get("blockers", [])
          if blockers:
              print("BLOCKED: Cannot proceed. Blockers remain after resolution attempt:")
              for b in blockers:
                  print(f"  - {b}")
              print()
              print("These require human judgment. Resolve in .dev-machine/STATE.yaml and re-run.")
              exit(1)
          else:
              print("All blockers resolved. Proceeding to work loop.")
      except Exception as e:
          print(f"Failed to check state: {e}")
          exit(1)
      PYEOF
    on_error: "fail"

  # ---------------------------------------------------------------------------
  # Step 3: Main work loop -- calls sub-recipe per iteration
  #
  # Each iteration: orient (read state) -> working session -> post-session check.
  # Loop exits when status becomes "blocked" or max iterations reached.
  # ---------------------------------------------------------------------------
  - id: "work-loop"
    type: "recipe"
    recipe: "./dev-machine-iteration.yaml"
    context:
      state_file: ".dev-machine/STATE.yaml"
      context_file: ".dev-machine/CONTEXT-TRANSFER.md"
      specs_dir: "specs"
      session_count: "{{session_count}}"
    output: "iteration_result"
    parse_json: true
    timeout: 4200
    on_error: "continue"
    while_condition: "{{status}} == 'healthy'"
    max_while_iterations: 50
    break_when: "{{status}} != 'healthy'"
    update_context:
      status: "{{iteration_result.iteration_result.status}}"
      session_count: "{{iteration_result.iteration_result.session_count}}"

  # ---------------------------------------------------------------------------
  # Step 4: Final summary
  # ---------------------------------------------------------------------------
  - id: "final-summary"
    type: "bash"
    command: |
      echo ""
      echo "========================================"
      echo "  ridecast2 Development Machine -- Run Complete"
      echo "========================================"
      echo ""
      echo "  Sessions completed: {{session_count}}"
      echo "  Final status:       {{status}}"
      echo ""
      if [ "{{status}}" = "blocked" ]; then
        echo "  Stopped: BLOCKERS detected"
        echo "  Check .dev-machine/STATE.yaml for blocker details."
      else
        echo "  Stopped: work loop exit (max iterations or no more work)"
      fi
      echo ""
      echo "  State file:    .dev-machine/STATE.yaml"
      echo "  Context file:  .dev-machine/CONTEXT-TRANSFER.md"
      echo ""
      echo "========================================"
    output: "summary"