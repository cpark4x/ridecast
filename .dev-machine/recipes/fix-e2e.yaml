# =============================================================================
# fix-e2e.yaml — Fix failing E2E tests per fix-e2e-selectors spec
# =============================================================================
#
# Context variables:
#   project_dir       (default ".")
#   spec_path         (default "specs/features/devx/fix-e2e-selectors.md")
#   pattern_a_files   — comma-separated list of Pattern A spec files
#   pattern_b_files   — comma-separated list of Pattern B spec files
#   playwright_config (default "playwright.config.ts")
#
# Pattern A: ambiguous getByText('Library') -> role-scoped selector
# Pattern B: missing 'Target Duration' element -> config / navigation fix
#
# Agents read the actual source files and edit them in place.
# Final step runs npm run test:e2e to confirm 5/5 passing.
# =============================================================================

name: "fix-e2e-selectors"
description: "Fix failing E2E tests by resolving Pattern A (ambiguous getByText) and Pattern B (missing Target Duration) selectors"
version: "1.0.0"
tags: ["e2e", "fix", "selectors", "playwright"]

context:
  project_dir: "."
  spec_path: "specs/features/devx/fix-e2e-selectors.md"
  pattern_a_files: "e2e/commute-flow.spec.ts,e2e/offline-listening.spec.ts,e2e/quick-relisten.spec.ts"
  pattern_b_files: "e2e/pdf-commute.spec.ts,e2e/article-discussion.spec.ts"
  playwright_config: "playwright.config.ts"
  e2e_exit_code: ""

steps:
  - id: "analyze-failures"
    agent: "foundation:zen-architect"
    mode: "ANALYZE"
    prompt: |
      Read the E2E fix specification at {{spec_path}}.

      Then read every file listed below and identify the exact lines that
      contain the problematic selectors or configuration.

      Pattern A files (ambiguous `getByText('Library')`):
        - {{pattern_a_files}}

      Pattern B files (missing 'Target Duration' element):
        - {{pattern_b_files}}

      Also read {{playwright_config}} and check:
        - webServer.command, webServer.url
        - use.baseURL
        - Whether these match the expected dev-server port (3000)

      Read src/components/BottomNav.tsx (or the equivalent navigation
      component) to determine the rendered role of the Library button
      (tab, button, or link).

      Produce a structured diagnosis:
        1. For each Pattern A file: the exact line numbers using
           getByText('Library') and the correct replacement selector
           based on the actual DOM role found in BottomNav.
        2. For each Pattern B file: the exact line numbers using
           getByText('Target Duration'), whether the Playwright config
           is correct, and whether a missing navigation step is the
           root cause.
        3. A concrete, file-by-file fix plan.
    output: "analysis"
    timeout: 300

  - id: "fix-pattern-a"
    agent: "foundation:bug-hunter"
    prompt: |
      Fix Pattern A — ambiguous `getByText('Library')` — in these E2E specs
      (working directory: {{project_dir}}):

        - {{pattern_a_files}}

      ANALYSIS FROM PREVIOUS STEP:
      {{analysis}}

      INSTRUCTIONS:
      For each file listed above, open it and replace every call to
        page.getByText('Library')
      with the role-scoped selector identified in the analysis. Prefer:
        page.getByRole('tab', { name: 'Library' })
      If BottomNav renders <button> elements rather than tab-role elements, use:
        page.getByRole('button', { name: 'Library' })
      If the role query is still ambiguous (multiple matches), fall back to
      adding `data-testid="library-tab"` to the Library entry in
      src/components/BottomNav.tsx and using:
        page.getByTestId('library-tab')

      CONSTRAINTS:
      - Edit files in place.
      - Change ONLY selectors — do not alter test logic, assertions, or flow.
      - Preserve all imports and formatting conventions.
    output: "pattern_a_result"
    timeout: 600

  - id: "fix-pattern-b"
    agent: "foundation:bug-hunter"
    prompt: |
      Fix Pattern B — missing 'Target Duration' element — in these E2E specs
      (working directory: {{project_dir}}):

        - {{pattern_b_files}}

      Also check and fix {{playwright_config}} if needed.

      ANALYSIS FROM PREVIOUS STEP:
      {{analysis}}

      INSTRUCTIONS:
      1. Open {{playwright_config}}. Verify that:
           webServer.url  === 'http://localhost:3000'
           use.baseURL    === 'http://localhost:3000'
         If either is wrong or missing, fix it. Ensure webServer.command
         runs the dev server (e.g., 'npm run dev') and set
         reuseExistingServer: !process.env.CI.

      2. For each Pattern B spec file, read the test flow and determine
         why `getByText('Target Duration')` finds nothing:
         a) If the UI requires clicking the uploaded item to navigate to
            the processing screen before 'Target Duration' appears, add
            the missing navigation step.
         b) If the label text changed in the UI, read the relevant React
            component to find the current copy and update the spec to match.
         c) If the element needs a wait, add an appropriate
            `await expect(...).toBeVisible()` assertion before interacting.

      CONSTRAINTS:
      - Edit files in place.
      - Preserve all existing test logic and assertions.
      - Only fix selectors, navigation gaps, and Playwright config mismatches.
    output: "pattern_b_result"
    timeout: 600

  - id: "run-e2e"
    type: "bash"
    command: "cd {{project_dir}} && npm run test:e2e 2>&1"
    output: "e2e_output"
    output_exit_code: "e2e_exit_code"
    on_error: "continue"
    timeout: 600

  - id: "summary"
    type: "bash"
    command: |
      echo "=== fix-e2e-selectors Result ==="
      echo "Pattern A files: {{pattern_a_files}}"
      echo "Pattern B files: {{pattern_b_files}}"
      echo ""
      if [ "{{e2e_exit_code}}" = "0" ]; then
        echo "E2E: PASS — all scenarios passing"
      else
        echo "E2E: FAIL (exit code {{e2e_exit_code}})"
        echo "Run manually: npm run test:e2e -- --headed"
      fi
      echo "================================"
    output: "final_output"
