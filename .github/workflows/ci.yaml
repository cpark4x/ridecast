# Ridecast CI — lint · unit tests · build · E2E
#
# Deterministic: AI/TTS routes are intercepted by Playwright's api-mocks.ts,
# so no ANTHROPIC_API_KEY or OPENAI_API_KEY are needed.
#
# Trigger strategy:
#   push → all branches (allows workflow runs on PR branches before merge)
#   pull_request → all branches (runs on every PR)
name: CI

on:
  push:  # allows workflow runs on PR branches before merge
  pull_request:

jobs:
  ci:
    name: Lint · Test · Build · E2E
    runs-on: ubuntu-latest

    # ── Postgres service ───────────────────────────────────────────────────────
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ridecast
          POSTGRES_DB: ridecast
          # POSTGRES_USER defaults to "postgres" — matches DATABASE_URL below
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── Job-level env ──────────────────────────────────────────────────────────
    env:
      DATABASE_URL: postgresql://postgres:ridecast@localhost:5432/ridecast
      NEXT_TELEMETRY_DISABLED: 1   # silence Next.js telemetry in CI

      # ── Clerk placeholder keys ────────────────────────────────────────────
      # These are intentionally fake values — NOT real credentials.
      #
      # Why they're needed:
      #   ClerkProvider (layout.tsx) reads NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
      #   at render time; without any value the SDK throws and crashes SSR.
      #   clerkMiddleware also performs an early format-check on the key when
      #   the module is first loaded during `npm run build`.
      #
      # Why they're safe:
      #   The E2E_TEST_MODE=true flag (injected by playwright.config.ts
      #   webServer.env) causes middleware.ts to return NextResponse.next()
      #   immediately, so clerkHandler() is never actually invoked.
      #   auth.ts likewise short-circuits before calling Clerk's auth(),
      #   returning the synthetic "e2e-test-user" identity instead.
      #   These dummy keys resolve to a non-existent Clerk instance, so they
      #   cannot authenticate anyone even if accidentally exposed.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_e2VyZWx5LXRlc3QtbW9kZQ
      CLERK_SECRET_KEY: sk_test_e2e_test_mode_placeholder_not_a_real_key
      NEXT_PUBLIC_E2E_TEST_MODE: "true"
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /

    # ── Steps ──────────────────────────────────────────────────────────────────
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # ─── Database setup (before tests) ──────────────────────────────────────────────────────
      - name: Run database migrations
        run: npx prisma migrate deploy

      # ─── Quality gates (mirror dev-machine verify) ───────────────────────────────────────────
      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # ─── Database seeding (before E2E) ─────────────────────────────────────────────────────
      - name: Seed database
        # E2E tests expect ready library items; seeding ensures test data exists
        run: npx prisma db seed

      # ── E2E ───────────────────────────────────────────────────────────────────
      # playwright.config.ts starts "npm run dev" automatically when CI=true.
      # api-mocks.ts intercepts /api/process and /api/audio/generate so no
      # real LLM or TTS credentials are required.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      # ── Artifacts (upload only on failure) ────────────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
