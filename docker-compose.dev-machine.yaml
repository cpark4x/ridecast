# Generated by amplifier-bundle-dev-machine — do not edit directly
# =============================================================================
# Amplifier Dev-Machine -- Sandboxed Execution (ridecast2)
#
# The ONLY writable host path is the project directory.
# Everything else is container-local or read-only.
# =============================================================================

services:
  dev-machine:
    build:
      context: .
      dockerfile: dev-machine.Dockerfile
      args:
        USER_UID: "501"
        USER_GID: "20"
    container_name: "ridecast2-dev-machine"
    image: "ridecast2-dev-machine:latest"

    # Use host networking to avoid Docker bridge NAT, which causes Cloudflare
    # bot-detection challenges on Anthropic API calls (different TLS fingerprint
    # through bridge NAT triggers CF). Filesystem isolation is what matters here,
    # not network isolation.
    network_mode: host

    # Restart policy for daemon mode (docker compose up -d).
    # The entrypoint handles retries internally with backoff, so this is
    # a safety net for container-level crashes (OOM, segfault, etc).
    restart: unless-stopped

    volumes:
      # -- Project directory -- READ-WRITE (the whole point) -------------------
      # Quoted: {{...}} starts with { which YAML would misparse as a flow mapping.
      # Docker Compose accepts quoted volume specs; template rendering works identically.
      - "/Users/chrispark/Projects/ridecast2:/Users/chrispark/Projects/ridecast2"

      # -- Dev-machine bundle -- READ-ONLY -------------------------------------
      - "/tmp/amplifier-bundle-dev-machine:/tmp/amplifier-bundle-dev-machine:ro"

      # -- SSH agent socket -- for git push from recipe infrastructure -----------
      # Key has a passphrase; we forward the host's ssh-agent instead of raw keys.
      # If the agent socket dies, push fails gracefully (on_error: continue).
      - "${SSH_AUTH_SOCK:-/dev/null}:/run/ssh-agent.sock:ro"

      # -- SSH known_hosts -- so git doesn't prompt on first push ---------------
      - "${HOME}/.ssh/known_hosts:${HOME}/.ssh/known_hosts:ro"

      # -- Config files at /config/ (read-only, entrypoint copies on first run) -
      - "${HOME}/.amplifier/keys.env:/config/keys.env:ro"
      # Settings: mount the GENERATED dev-machine-settings.yaml, NOT the host's
      # interactive settings.yaml. The host settings typically includes bundles
      # and tools the container doesn't have installed (MCP, browser, issues,
      # notifications, etc.), causing ModuleValidationError spam at startup.
      # The generated file includes only what the machine needs: one provider
      # and the foundation bundle.
      - "./dev-machine-settings.yaml:/config/settings.yaml:ro"

      # -- GitHub CLI (optional) -- for HTTPS auth on private repo clones ------
      # If the host has `gh` authenticated, mount the binary and its config so
      # the container can use `gh auth git-credential` as a git credential
      # helper. This enables HTTPS clones of private repos (e.g. Microsoft
      # amplifier modules) without requiring SSH for everything.
      - "${HOME}/.config/gh:${HOME}/.config/gh:ro"
      - "/opt/homebrew/bin/gh:/usr/local/bin/gh:ro"

      # -- Amplifier runtime -- bind-mount (host-visible for operator diagnostics) -
      # NOT the host's ~/.amplifier. This is the container's own runtime directory,
      # bind-mounted so session logs and recipe state are accessible from the host
      # for the operator agent and manual diagnostics.
      # Container builds its own cache because host cache has editable installs
      # pointing at the HOST's Python venv.
      # Persists across container restarts. The generation mode must mkdir this dir
      # AND its cache/ subdirectory to prevent Docker from creating them as root.
      - "/Users/chrispark/Projects/ridecast2/.dev-machine-amplifier:${HOME}/.amplifier"

    # API keys + SSH agent socket path
    environment:
      - SSH_AUTH_SOCK=/run/ssh-agent.sock

    env_file:
      - "${HOME}/.amplifier/keys.env"

    # Writable scratch space
    tmpfs:
      - /tmp:size=1G

    # -- Security hardening ----------------------------------------------------
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # Recipe loops can run for hours
    stdin_open: true
    tty: true

# =============================================================================
# What's NOT accessible (by design):
#
#   Parent directories above /Users/chrispark/Projects/ridecast2  -- only project dir is mounted
#   ~/.ssh/                -- mounted read-only (recipe infra pushes, agent cannot)
#   Host ~/.amplifier/     -- container has its own at .dev-machine-amplifier/
#   ~/.bashrc, ~/.profile  -- container has its own
#   /etc/, /var/, /usr/    -- container-local copies
#   Any other host paths   -- Docker isolation blocks access
#
# What CAN the agent damage?
#
#   Only /Users/chrispark/Projects/ridecast2 (read-write)
#   That's the project -- it's supposed to modify it. Use git to recover.
#
# What's host-visible for operator diagnostics?
#
#   /Users/chrispark/Projects/ridecast2/.dev-machine-amplifier/  -- container's Amplifier session logs
#   /Users/chrispark/Projects/ridecast2/dev-machine-container.log -- entrypoint stdout mirror
#   /Users/chrispark/Projects/ridecast2/dev-machine-monitor.log  -- host monitor script output
#   /Users/chrispark/Projects/ridecast2/dev-machine-watchdog.log -- host watchdog script output
#   /Users/chrispark/Projects/ridecast2/.dev-machine-postmortem  -- halt postmortem (if halted)
#   /Users/chrispark/Projects/ridecast2/STATE.yaml               -- machine state
# =============================================================================
