# Generated by amplifier-bundle-dev-machine — do not edit directly
# =============================================================================
# Amplifier Settings for ridecast2 Dev Machine
#
# This is a MINIMAL settings file tailored for autonomous dev machine operation.
# It includes ONLY what the machine needs: a single LLM provider and the
# foundation bundle. No app bundles, no extra tools, no notifications.
#
# Why not use the host's settings.yaml?
#   The host's settings typically includes interactive bundles (superpowers,
#   smoke-test, browser tools, MCP, issue tracking, etc.) that depend on
#   Python packages not installed in the container. Each missing dependency
#   produces a ModuleValidationError traceback at startup — noisy, wasteful,
#   and confusing in container logs.
#
# To customize: edit this file directly after generation. It belongs to the
# project now. Changes take effect on next container rebuild (or delete the
# named volume to force re-seeding: docker volume rm ridecast2-amplifier-home).
# =============================================================================

bundle:
  active: foundation

config:
  providers:
    - module: provider-anthropic
      source: git+https://github.com/microsoft/amplifier-module-provider-anthropic@main
      config:
        api_key: ${ANTHROPIC_API_KEY}
        default_model: claude-sonnet-4-20250514
        enable_prompt_caching: 'true'
        priority: 1
